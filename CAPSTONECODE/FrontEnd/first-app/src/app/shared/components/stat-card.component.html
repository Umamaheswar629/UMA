<div class="relative bg-white/85 backdrop-blur-md rounded-xl border border-white/60 overflow-hidden transition-all duration-300 hover:-translate-y-1 hover:shadow-lg hover:shadow-indigo-500/8 group">
  <div class="h-1 w-full bg-gradient-to-r" [ngClass]="colorClass"></div>
  <div class="p-5">
    <dt class="text-xs font-semibold text-gray-400 uppercase tracking-wider truncate">
      {{ title }}
    </dt>
    <dd class="mt-2 text-2xl font-bold text-gray-900 tracking-tight">
      {{ value }}
    </dd>
    @if (subtitle) {
      <p class="mt-2 text-xs text-gray-500">
        {{ subtitle }}
      </p>
    }
  </div>
  <!-- Subtle gradient hover accent -->
  <div class="absolute bottom-0 left-0 right-0 h-0.5 bg-gradient-to-r from-indigo-500 via-violet-500 to-blue-500 opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
</div>

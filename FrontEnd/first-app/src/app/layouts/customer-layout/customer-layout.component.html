<div class="h-screen flex overflow-hidden bg-gray-100">
  <!-- Sidebar -->
  <div
    class="bg-slate-900 text-white flex-shrink-0 flex flex-col transition-all duration-300 z-20 absolute inset-y-0 left-0 transform md:relative md:translate-x-0 transition duration-200 ease-in-out w-64"
    [class.-translate-x-full]="!sidebarOpen()" [class.translate-x-0]="sidebarOpen()">

    <div class="h-16 flex items-center px-6 bg-slate-950 font-bold text-xl tracking-wider border-b border-slate-800">
      CIPMS Portal
    </div>

    <div class="flex-1 overflow-y-auto py-4">
      <nav class="px-2 space-y-1">
        <a routerLink="/customer/dashboard" routerLinkActive="bg-blue-700 text-white"
          class="group flex items-center px-4 py-3 text-sm font-medium rounded-md text-slate-300 hover:bg-slate-800 hover:text-white transition-colors">
          Dashboard
        </a>
        <a routerLink="/customer/business-profile" routerLinkActive="bg-blue-700 text-white"
          class="group flex items-center px-4 py-3 text-sm font-medium rounded-md text-slate-300 hover:bg-slate-800 hover:text-white transition-colors">
          Business Profile
        </a>
        <a routerLink="/customer/quotes" routerLinkActive="bg-blue-700 text-white"
          class="group flex items-center px-4 py-3 text-sm font-medium rounded-md text-slate-300 hover:bg-slate-800 hover:text-white transition-colors">
          Get Quotes
        </a>
        <a routerLink="/customer/policies" routerLinkActive="bg-blue-700 text-white"
          class="group flex items-center px-4 py-3 text-sm font-medium rounded-md text-slate-300 hover:bg-slate-800 hover:text-white transition-colors">
          My Policies
        </a>
        <a routerLink="/customer/billing" routerLinkActive="bg-blue-700 text-white"
          class="group flex items-center px-4 py-3 text-sm font-medium rounded-md text-slate-300 hover:bg-slate-800 hover:text-white transition-colors">
          Billing
        </a>
        <a routerLink="/customer/claims" routerLinkActive="bg-blue-700 text-white"
          class="group flex items-center px-4 py-3 text-sm font-medium rounded-md text-slate-300 hover:bg-slate-800 hover:text-white transition-colors">
          My Claims
        </a>
        <a routerLink="/customer/notifications" routerLinkActive="bg-blue-700 text-white"
          class="group flex items-center px-4 py-3 text-sm font-medium rounded-md text-slate-300 hover:bg-slate-800 hover:text-white transition-colors">
          <span class="flex-1">Notifications</span>
          <span *ngIf="unreadCount() > 0" class="bg-red-500 text-white py-0.5 px-2 rounded-full text-xs font-bold">
            {{ unreadCount() }}
          </span>
        </a>
        <a routerLink="/customer/error-log" routerLinkActive="bg-blue-700 text-white"
          class="group flex items-center px-4 py-3 text-sm font-medium rounded-md text-slate-300 hover:bg-slate-800 hover:text-white transition-colors">
          <span class="flex-1">Error Log</span>
          @if (errorLogService.errorCount() > 0) {
          <span class="bg-red-500 text-white py-0.5 px-2 rounded-full text-xs font-bold">
            {{ errorLogService.errorCount() }}
          </span>
          }
        </a>
      </nav>
    </div>
  </div>

  <!-- Main Content Area -->
  <div class="flex-1 flex flex-col overflow-hidden w-full">
    <!-- Top Navbar -->
    <header
      class="h-16 bg-white shadow-sm flex items-center justify-between px-4 sm:px-6 lg:px-8 z-10 transition-all duration-300">
      <div class="flex items-center w-full">
        <button (click)="toggleSidebar()" class="text-gray-500 hover:text-gray-700 focus:outline-none md:hidden mr-4">
          <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
          </svg>
        </button>
        <h1 class="text-xl font-semibold text-gray-800 hidden md:block">Customer Portal</h1>

        <div class="flex-1 flex justify-end items-center space-x-4">
          <button routerLink="/customer/notifications"
            class="relative p-2 text-gray-400 hover:text-blue-500 focus:outline-none transition-colors">
            <span class="sr-only">View notifications</span>
            <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
            </svg>
            <span *ngIf="unreadCount() > 0"
              class="absolute top-1 right-1 block items-center justify-center h-4 w-4 rounded-full bg-red-500 text-white text-[10px] font-bold ring-2 ring-white">
              {{ unreadCount() > 99 ? '99+' : unreadCount() }}
            </span>
          </button>

          <div class="flex items-center space-x-3 border-l border-gray-200 pl-4">
            <div
              class="h-8 w-8 rounded-full bg-blue-600 flex items-center justify-center text-white font-bold uppercase">
              {{ userInitials() }}
            </div>
            <span class="text-sm font-medium text-gray-700 hidden sm:block">{{ currentUser()?.fullName }}</span>
            <button (click)="logout()"
              class="ml-2 text-sm font-medium text-red-600 hover:text-red-800 transition-colors">
              Logout
            </button>
          </div>
        </div>
      </div>
    </header>

    <!-- Main Workspace -->
    <main class="flex-1 overflow-x-hidden overflow-y-auto bg-gray-50 p-4 sm:p-6 lg:p-8">
      <router-outlet></router-outlet>
    </main>
  </div>

  <!-- Mobile sidebar overlay -->
  <div *ngIf="sidebarOpen()" (click)="toggleSidebar()"
    class="fixed inset-0 bg-gray-800 bg-opacity-50 z-10 md:hidden backdrop-blur-sm"></div>
</div>

<div class="bg-white rounded-lg shadow-sm border border-gray-100 overflow-hidden hover:shadow-md transition-shadow duration-200">
  <div class="h-1.5 w-full" [ngClass]="colorClass"></div>
  <div class="p-5">
    <dt class="text-sm font-medium text-gray-500 truncate">
      {{ title }}
    </dt>
    <dd class="mt-2 text-3xl font-semibold text-gray-900">
      {{ value }}
    </dd>
    @if (subtitle) {
      <p class="mt-2 text-xs text-gray-500">
        {{ subtitle }}
      </p>
    }
  </div>
</div>
